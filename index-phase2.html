<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent World — Phase 2 進階版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1A1A2E;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            color: #C0C0C0;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.9);
            border: 2px solid #4A90E2;
            border-radius: 8px;
            padding: 16px;
            max-width: 350px;
        }
        #ui-overlay h1 {
            font-size: 18px;
            color: #4A90E2;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .status-label {
            color: #888;
        }
        .status-value {
            color: #C0C0C0;
            font-weight: bold;
        }
        .agent-card {
            background: rgba(74, 144, 226, 0.1);
            border: 1px solid #4A90E2;
            border-radius: 4px;
            padding: 8px;
            margin-top: 12px;
        }
        .agent-name {
            font-size: 14px;
            color: #4A90E2;
            font-weight: bold;
        }
        .agent-status {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        .scene-selector {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #4A90E2;
        }
        .scene-selector h3 {
            font-size: 12px;
            color: #4A90E2;
            margin-bottom: 8px;
        }
        .scene-btn {
            display: block;
            width: 100%;
            padding: 6px 10px;
            margin-bottom: 4px;
            background: rgba(74, 144, 226, 0.1);
            border: 1px solid #4A90E2;
            border-radius: 4px;
            color: #C0C0C0;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .scene-btn:hover {
            background: rgba(74, 144, 226, 0.3);
        }
        .scene-btn.active {
            background: #4A90E2;
            color: #fff;
        }
        #ws-status {
            margin-top: 12px;
            padding: 6px;
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid #2ECC71;
            border-radius: 4px;
            font-size: 11px;
            color: #2ECC71;
        }
        #ws-status.disconnected {
            background: rgba(231, 76, 60, 0.1);
            border-color: #E74C3C;
            color: #E74C3C;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #4A90E2;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-spinner"></div>
        <div>初始化 Agent World Phase 2...</div>
        <div style="font-size: 11px; color: #888; margin-top: 8px;">載入場景系統 · WebSocket · 音效引擎</div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div id="ui-overlay">
        <h1>🤖 Agent World <span style="font-size: 10px; color: #9B59B6;">PHASE 2</span></h1>
        
        <div class="status-item">
            <span class="status-label">場景:</span>
            <span class="status-value" id="scene-name">情報分析署</span>
        </div>
        <div class="status-item">
            <span class="status-label">FPS:</span>
            <span class="status-value" id="fps-counter">0</span>
        </div>
        <div class="status-item">
            <span class="status-label">Agent 數量:</span>
            <span class="status-value" id="agent-count">0</span>
        </div>
        
        <div id="ws-status">🔌 WebSocket: 連接中...</div>
        
        <div class="agent-card">
            <div class="agent-name">HERMES-01</div>
            <div class="agent-status" id="hermes-status">待命中...</div>
        </div>
        
        <div class="scene-selector">
            <h3>🗺️ 場景切換</h3>
            <button class="scene-btn" data-scene="intelligence">🏢 情報分析署</button>
            <button class="scene-btn" data-scene="command">⚔️ 作戰指揮室</button>
            <button class="scene-btn" data-scene="datacenter">💾 資料處理中心</button>
            <button class="scene-btn" data-scene="relay">📡 通訊中繼站</button>
        </div>
    </div>

    <script src="https://pixijs.download/v8.1.0/pixi.min.js"></script>
    <script src="agent-world-phase2.js"></script>
    <script>
        // 場景切換按鈕事件
        document.querySelectorAll('.scene-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const scene = btn.dataset.scene;
                if (window.sceneManager) {
                    window.sceneManager.setScene(scene);
                    
                    // 更新按鈕狀態
                    document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                }
            });
        });
        
        // WebSocket 狀態更新
        function updateWsStatus(connected) {
            const el = document.getElementById('ws-status');
            if (connected) {
                el.textContent = '🔌 WebSocket: 已連接';
                el.classList.remove('disconnected');
            } else {
                el.textContent = '🔌 WebSocket: 未連接';
                el.classList.add('disconnected');
            }
        }
    </script>
</body>
</html>
